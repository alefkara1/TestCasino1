<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Змейка</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; margin:0; overflow:hidden;}
    canvas { background: #111; border: 2px solid #333; }
    #score { color: #fff; font-family: Arial, sans-serif; font-size: 1.2em; margin-bottom: 10px; text-align: center;}
  </style>
</head>
<body>
  <div>
    <!-- Игровой контейнер: canvas + оверлей меню/настроек/кнопок + HUD -->
    <div id="gameWrap" style="position:relative; display:inline-block;">
      <canvas id="game" width="400" height="400" style="display:block;"></canvas>

      <!-- Оверлейное меню поверх поля (по центру) -->
      <div id="overlay" style="position:absolute; left:0; top:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; pointer-events:none;">
        <div id="overlayContent" style="pointer-events:auto; text-align:center; background:rgba(10,10,10,0.65); color:#fff; padding:18px; border-radius:8px;">
          <h1 id="title">Змейка</h1>
          <div style="margin:8px 0;">
            <button id="startBtn" style="padding:10px 16px; font-size:1em; margin:6px; cursor:pointer;">Начать игру</button>
            <button id="settingsBtn" style="padding:10px 16px; font-size:1em; margin:6px; cursor:pointer;">Настройки</button>
          </div>
          <div id="overlaySettings" style="display:none; text-align:left; max-width:320px; margin:0 auto;">
            <h3 style="margin-top:0;">Настройки</h3>
            <label style="display:block; margin-bottom:8px;">Язык:
              <select id="langSelect" style="margin-left:8px;">
                <option value="ru">Русский</option>
                <option value="en">English</option>
              </select>
            </label>
            <label style="display:block; margin-bottom:8px;">Масштаб: <span id="scaleValue">1.0</span>
              <input id="scaleRange" type="range" min="0.4" max="1.0" step="0.05" value="0.9" style="width:100%; display:block; margin-top:6px;">
            </label>
            <div style="text-align:right; margin-top:8px;">
              <button id="backBtn" style="padding:6px 10px; cursor:pointer;">Назад</button>
            </div>
          </div>
        </div>
      </div>

      <!-- HUD: счёт и кнопки поверх поля -->
      <div id="hud" style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none;">
        <div id="score" style="position:absolute; left:8px; top:8px; color:#fff; font-family:Arial, sans-serif; font-size:1.2em; pointer-events:auto; background:rgba(0,0,0,0.35); padding:6px 10px; border-radius:6px;">Счёт: 0</div>
        <div id="hudButtons" style="position:absolute; left:50%; bottom:12px; transform:translateX(-50%); pointer-events:auto;">
          <button id="restartBtn" style="display:none; padding:8px 12px; font-size:1em; cursor:pointer; margin-right:8px;">Начать заново</button>
          <button id="menuBtn" style="display:none; padding:8px 12px; font-size:1em; cursor:pointer;">В меню</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function(){
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const box = 20;
    let canvasWidth = 400;
    let canvasHeight = 400;
    let score = 0;
    let direction = 'right';
    let gameLoop;
    let isGameOver = false;

    let snake = [];
    let food = {x:0,y:0};
    // Демо (фон) — независимая игра компьютером
    let demoSnake = [];
    let demoFood = {x:0,y:0};
    let demoDirection = 'right';
    let demoLoop = null;
      // Фоновая канва для лужайки
    let bgCanvas = document.createElement('canvas');

    // SVG-декорации поверх фона (векторные элементы)

    decorSVG.setAttribute('style', 'position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none;');
    decorSVG.setAttribute('preserveAspectRatio','xMidYMid slice');
    const gameWrapEl = document.getElementById('gameWrap');
    if (gameWrapEl) gameWrapEl.appendChild(decorSVG);

    // Встроенный SVG-логотип (взято из файла пользователя)
    const svgLogo = `<?xml version="1.0" encoding="utf-8"?>\n<svg height="16" width="136" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 136 14.6"><defs><clipPath id="a"><path fill="none" d="M53.76 0H136v14.6H53.76z"/></clipPath></defs><path d="M0 12.3V5.59h2.27a2.62 2.62 0 011.29.28 1.83 1.83 0 01.74.77 2.25 2.25 0 01.25 1.07 2.26 2.26 0 01-.25 1.08 1.77 1.77 0 01-.74.77 2.55 2.55 0 01-1.28.29H.66v-.72h1.59a1.81 1.81 0 00.87-.19 1.1 1.1 0 00.48-.5 1.73 1.73 0 00.15-.73A1.66 1.66 0 003.6 7a1.1 1.1 0 00-.48-.5 1.86 1.86 0 00-.88-.18H.81v6zm7.74.1a2.29 2.29 0 01-1.2-.32 2.29 2.29 0 01-.8-.91 3.06 3.06 0 01-.28-1.36 3.07 3.07 0 01.28-1.37 2.14 2.14 0 012-1.24 2.14 2.14 0 012 1.24A3.07 3.07 0 0110 9.81a3.06 3.06 0 01-.29 1.36 2.11 2.11 0 01-2 1.23zm0-.69a1.31 1.31 0 00.85-.27 1.6 1.6 0 00.5-.69 2.9 2.9 0 00.16-.94 2.85 2.85 0 00-.16-.94 1.67 1.67 0 00-.5-.71 1.37 1.37 0 00-.85-.26 1.35 1.35 0 00-.85.26 1.67 1.67 0 00-.5.71 2.85 2.85 0 00-.16.94 2.9 2.9 0 00.16.94 1.6 1.6 0 00.5.69 1.29 1.29 0 00.85.27zm4.43.59l-1.54-5h.82l1.08 3.85h.06l1.07-3.85h.83l1.06 3.84 1.09-3.84h.81l-1.45 5h-.76l-1.1-3.87H14l-1.1 3.87zm8.29.1a2.3 2.3 0 01-1.25-.32 2.14 2.14 0 01-.81-.9 3.06 3.06 0 01-.28-1.36 3.09 3.09 0 01.28-1.36 2.16 2.16 0 01.79-.92 2.08 2.08 0 011.19-.34 2.66 2.66 0 01.78.13 2 2 0 01.7.43 2.06 2.06 0 01.5.77 3.43 3.43 0 01.18 1.19V10h-3.87v-.62h3.09a1.67 1.67 0 00-.17-.76 1.23 1.23 0 00-.48-.53 1.35 1.35 0 00-.73-.19 1.41 1.41 0 00-.8.22 1.61 1.61 0 00-.51.59 1.78 1.78 0 00-.18.78v.45a2.21 2.21 0 00.19 1 1.48 1.48 0 00.56.6 1.66 1.66 0 00.82.2 1.59 1.59 0 00.55-.09 1.1 1.1 0 00.43-.26 1.23 1.23 0 00.28-.44l.74.21a1.56 1.56 0 01-.39.67 2.06 2.06 0 01-.69.45 2.65 2.65 0 01-.92.12zm3.26-.1v-5h.75V8h.05a1.23 1.23 0 01.5-.61 1.5 1.5 0 01.81-.23h.4V8h-.18a1.32 1.32 0 00-.29 0 1.38 1.38 0 00-.65.15 1.15 1.15 0 00-.62 1v3.15zm5.39.1a2.32 2.32 0 01-1.26-.32 2.14 2.14 0 01-.81-.9 3.2 3.2 0 01-.28-1.36A3.24 3.24 0 0127 8.46a2.18 2.18 0 01.8-.92A2.05 2.05 0 0129 7.2a2.54 2.54 0 01.77.13 1.9 1.9 0 01.7.43 1.94 1.94 0 01.5.77 3.19 3.19 0 01.19 1.19V10h-3.85v-.62h3.09a1.55 1.55 0 00-.17-.76 1.28 1.28 0 00-.47-.53A1.35 1.35 0 0029 7.9a1.39 1.39 0 00-.8.22 1.73 1.73 0 00-.52.59 1.78 1.78 0 00-.18.78v.45a2.21 2.21 0 00.2 1 1.46 1.46 0 00.55.6 1.7 1.7 0 00.83.2 1.63 1.63 0 00.55-.09 1.18 1.18 0 00.43-.26 1.09 1.09 0 00.27-.44l.75.21a1.67 1.67 0 01-.39.67 2.06 2.06 0 01-.69.45 2.69 2.69 0 01-.89.12zm5.16 0a1.9 1.9 0 01-1.11-.32 2 2 0 01-.76-.9 3.27 3.27 0 01-.27-1.38 3.27 3.27 0 01.27-1.38 2.11 2.11 0 01.76-.9 2 2 0 011.12-.32 1.52 1.52 0 01.77.17 1.16 1.16 0 01.44.36 2.81 2.81 0 01.24.34h.07V5.59h.77v6.71h-.75v-.78h-.09a2.21 2.21 0 01-.24.35 1.31 1.31 0 01-.45.37 1.55 1.55 0 01-.77.16zm.1-.69a1.3 1.3 0 00.79-.24 1.56 1.56 0 00.48-.68 2.64 2.64 0 00.17-1 2.69 2.69 0 00-.16-1 1.42 1.42 0 00-.49-.67 1.34 1.34 0 00-.79-.23 1.29 1.29 0 00-.82.25 1.52 1.52 0 00-.49.68 2.82 2.82 0 00-.16.95 2.76 2.76 0 00.17 1 1.53 1.53 0 00.49.69 1.29 1.29 0 00.81.25zm6.42.59V5.59h.78v2.48h.06l.24-.34a1.24 1.24 0 01.44-.36 1.56 1.56 0 01.78-.17 2 2 0 011.12.32 2.09 2.09 0 01.75.9 3.27 3.27 0 01.27 1.38 3.27 3.27 0 01-.23 1.38 2.09 2.09 0 01-.75.9 1.9 1.9 0 01-1.11.32 1.61 1.61 0 01-.78-.16 1.54 1.54 0 01-.45-.37c-.1-.14-.18-.25-.24-.35h-.09v.78zm.76-2.52a2.85 2.85 0 00.17 1 1.5 1.5 0 00.49.68 1.39 1.39 0 001.59 0 1.46 1.46 0 00.49-.69 2.55 2.55 0 00.17-1 2.59 2.59 0 00-.16-.95 1.45 1.45 0 00-.49-.68A1.29 1.29 0 0043 7.9a1.36 1.36 0 00-.79.23 1.47 1.47 0 00-.48.67 2.68 2.68 0 00-.18.98zm5.18 4.4a1.9 1.9 0 01-.35 0l-.21-.06.2-.68a1.29 1.29 0 00.5.05.56.56 0 00.38-.19 1.53 1.53 0 00.31-.55l.14-.4-1.86-5.08h.84l1.39 4 1.39-4h.84L48.22 13a2.35 2.35 0 01-.36.65 1.31 1.31 0 01-.5.38 1.54 1.54 0 01-.63.15z" fill="#6a6a6a"/><g clip-path="url(#a)"><path d="M56.36 8.7c0 2.69 1.23 4.35 3.1 4.35s3-1.65 3-4.34c0-2.89-1.16-4.37-3-4.37s-3.1 1.47-3.1 4.36zm8.75 0a5.68 5.68 0 11-11.35 0 5.68 5.68 0 1111.35 0zM121.09 6c0-.84.79-1.39 2-1.39 1.37 0 2.13.62 2.22 1.59h2.31c0-2-1.73-3.41-4.53-3.41-2.46 0-4.18 1.21-4.18 3.32 0 4.25 6.71 2.38 6.71 5.15 0 .93-.88 1.52-2.22 1.52-1.5 0-2.38-.64-2.55-1.64h-2.32c.14 2.08 2 3.46 4.87 3.46 2.52 0 4.42-1.2 4.42-3.45-.03-4.24-6.73-2.4-6.73-5.15zm-54.56 8.39V3h2.14v3.54c.63-2.45 2-3.75 4.24-3.75a3.43 3.43 0 013.6 3.79v7.81h-2.34V7.45c0-1.51-.8-2.71-2.36-2.71a3 3 0 00-2.93 3.13v6.52zM116.85 3v11.39h-2.23v-3.53c-.52 2.45-1.85 3.75-4 3.75-2 0-3.5-1.26-3.5-3.79V3h2.33v7c0 1.51.72 2.7 2.25 2.7a3 3 0 002.86-3.12V3zm-33.24 9.93c-2 0-3-1.54-3-4.10v-.2h8.29C88.82 5 87 2.79 83.52 2.79c-3.24 0-5.53 2.38-5.53 6 0 3.29 1.92 5.82 5.6 5.82 3.49 0 5.13-2.27 5.23-4.31h-2.39c-.17 1.63-.84 2.63-2.82 2.63zm-.07-8.47a2.76 2.76 0 012.77 2.93h-5.6C81 5.46 82 4.46 83.54 4.46zM105.58 3v2.35c-.78 0-1.09-.07-1.36-.07-1.65 0-2.71.72-3.06 2.78a7.85 7.85 0 00-.09 1.19v5.14h-2.33V3h2.12v3.58a14.9 14.9 0 01.79-2A2.59 2.59 0 01104 3zm27.49 8.85c0 .75.27 1 1 1h1.91v1.49h-2.72a2.26 2.26 0 01-2.48-2.49V4.63h-2.27V3.31h1.14a1.5 1.5 0 001-.28 1.72 1.72 0 00.32-1c0-.27.06-.61.08-1s0-.94 0-1h2V3H136v1.64h-2.92zm-39.18 0c0 .75.26 1 1 1h1.91v1.49h-2.71a2.27 2.27 0 01-2.48-2.49V4.63h-2.27V3.31h1.15a1.49 1.49 0 00.94-.31 1.72 1.72 0 00.32-1c0-.27.07-.61.09-1s0-.94 0-1h2v3h2.93v1.64h-2.88z" fill="#689d65"/></g></svg>`;

    const translations = {
      ru: { start: 'Начать игру', settings: 'Настройки', score: 'Счёт', gameOver: 'Игра окончена!', restart: 'Начать заново', back: 'Назад', title: 'Змейка', menu: 'В меню' },
      en: { start: 'Start Game', settings: 'Settings', score: 'Score', gameOver: 'Game Over!', restart: 'Restart', back: 'Back', title: 'Snake', menu: 'Menu' }
    };

      // Попытка загрузить изображение текстуры змеи из Downloads (перебор форматов)
      const snakeImg = new Image();
      let snakeImgLoaded = false;
      // обрезать прозрачную рамку (пиксели) с краёв текстуры при рисовании
      const snakeTrim = 4; // px отрезаем с каждой стороны
      let snakeImgSource = null; // может быть исходным изображением или канвасом с обрезкой
      const snakeCandidates = [
        '../../../Downloads/змеячёрная.jfif',
        '../../../Downloads/текстуразмеи.webp',
        '../../../Downloads/текстуразмеи.avif',
        '../../../Downloads/текстуразмеи.png',
        '../../../Downloads/текстуразмеи.jpg',
        '../../../Downloads/змея.avif'
      ];
      let _snakeTryIndex = 0;
      snakeImg.onload = function(){
        snakeImgLoaded = true;
        try {
          const sw = Math.max(1, snakeImg.width - snakeTrim*2);
          const sh = Math.max(1, snakeImg.height - snakeTrim*2);
          const pc = document.createElement('canvas');
          pc.width = sw; pc.height = sh;
          const pcCtx = pc.getContext('2d');
          pcCtx.imageSmoothingEnabled = true;
          // рисуем обрезанную центральную часть исходного изображения
          pcCtx.drawImage(snakeImg, snakeTrim, snakeTrim, sw, sh, 0, 0, sw, sh);
          snakeImgSource = pc;
        } catch (e) {
          snakeImgSource = snakeImg;
        }
      };
      snakeImg.onerror = function(){
        if (_snakeTryIndex < snakeCandidates.length) {
          // пробуем следующий путь
          snakeImg.src = encodeURI(snakeCandidates[_snakeTryIndex++]);
        } else {
          snakeImgLoaded = false;
          console.warn('Не удалось загрузить ни одну текстуру змеи, использую fallback-отрисовку.');
        }
      };
      // стартуем первый
      if (snakeCandidates.length) { snakeImg.src = encodeURI(snakeCandidates[_snakeTryIndex++]); }

      // Загрузка изображения яблока для еды
      const appleImg = new Image();
      let appleLoaded = false;
      const appleCandidates = [
        '../../../Downloads/яблокотекст.jpg',
        '../../../Downloads/яблоко1.png',
        '../../../Downloads/яблоко1.avif',
        '../../../Downloads/яблоко1.jpg',
        '../../../Downloads/яблоко1.jfif',
        '../../../Downloads/яблоко.avif',
        '../../../Downloads/яблоко.png',
        '../../../Downloads/яблоко.jpg'
      ];
      const appleScale = 1.4; // увеличение размера яблока относительно клетки
      let _appleTry = 0;
      appleImg.onload = function(){ appleLoaded = true; };
      appleImg.onerror = function(){ if (_appleTry < appleCandidates.length) { appleImg.src = encodeURI(appleCandidates[_appleTry++]); } else { appleLoaded = false; console.warn('Не удалось загрузить изображение яблока'); } };
      if (appleCandidates.length) appleImg.src = encodeURI(appleCandidates[_appleTry++]);

      // Загрузка изображения головы змеи (если есть)
      const headImg = new Image();
      let headLoaded = false;
      const headCandidates = [
        '../../../Downloads/голова.png',
        '../../../Downloads/голова.avif',
        '../../../Downloads/голова.jpg',
        '../../../Downloads/голова.jfif'
      ];
      let _headTry = 0;
      headImg.onload = function(){ headLoaded = true; };
      headImg.onerror = function(){ if (_headTry < headCandidates.length) { headImg.src = encodeURI(headCandidates[_headTry++]); } else { headLoaded = false; console.warn('Не найден файл головы, используем обычную отрисовку'); } };
      if (headCandidates.length) headImg.src = encodeURI(headCandidates[_headTry++]);

    let lang = 'ru';
    let scale = 0.9;

    const overlay = document.getElementById('overlay');
    const overlaySettings = document.getElementById('overlaySettings');
    const startBtn = document.getElementById('startBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const backBtn = document.getElementById('backBtn');
    const langSelect = document.getElementById('langSelect');
    const scaleRange = document.getElementById('scaleRange');
    const scaleValue = document.getElementById('scaleValue');
    const restartBtn = document.getElementById('restartBtn');
    const menuBtn = document.getElementById('menuBtn');
    const titleEl = document.getElementById('title');

    function drawBox(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * box, y * box, box-2, box-2);
    }

    function draw() {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
      // отрисовываем фоновую лужайку
      if (bgCanvas && bgCanvas.width > 0 && bgCanvas.height > 0) {
        // bgCanvas может быть с учётом devicePixelRatio, поэтому масштабируем при рисовании
        ctx.drawImage(bgCanvas, 0, 0, bgCanvas.width, bgCanvas.height, 0, 0, canvasWidth, canvasHeight);
      } else {
        // если фон не сгенерирован, заливка на случай
        ctx.fillStyle = '#2b8a2b'; ctx.fillRect(0,0,canvasWidth,canvasHeight);
      }
      // Если меню открыт — рисуем демо на фоне; иначе — рисуем игровую змею
      if (overlay && overlay.style.display !== 'none') {
        // демо играет на фоне
        drawDemo();
      } else {
          // Рисуем змейку как цельный объект
            drawSnakeContinuous(snake, '#3c6', '#0f0', 1);
        drawFood(food.x, food.y);
      }
      document.getElementById('score').textContent = translations[lang].score + ': ' + score;
    }

    // Отрисовка демо-змейки (на фоне, чуть тусклее)
    function drawDemo() {
      if (!demoSnake.length) return;
      // Рисуем демонстрационную змейку и яблоко используя те же модели, что и в игре
      drawSnakeContinuous(demoSnake, '#5a7', '#8f8', 0.65);
      drawFood(demoFood.x, demoFood.y, '#c55');
    }

      // Рисуем змейку как непрерывную форму, проводя толстую линию через центры сегментов.
      function drawSnakeContinuous(arr, bodyColor = '#3c6', headColor = '#0f0', alpha = 1) {
        if (!arr || arr.length === 0) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineWidth = Math.max(1, box - 2);
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        // если есть текстура — используем её как паттерн для stroke
        try {
          if (snakeImgLoaded) {
            const src = snakeImgSource || snakeImg;
            const pat = ctx.createPattern(src, 'repeat');
            if (pat) ctx.strokeStyle = pat; else ctx.strokeStyle = bodyColor;
          } else ctx.strokeStyle = bodyColor;
        } catch (e) { ctx.strokeStyle = bodyColor; }
        ctx.beginPath();
        ctx.moveTo(arr[0].x * box + box/2, arr[0].y * box + box/2);
        for (let i = 1; i < arr.length; i++) {
          ctx.lineTo(arr[i].x * box + box/2, arr[i].y * box + box/2);
        }
        ctx.stroke();
        ctx.restore();
        // Рисуем голову овальной формы; узкая сторона ориентирована в сторону движения
        const head = arr[0];
        if (head) {
          const cx = head.x * box + box/2;
          const cy = head.y * box + box/2;
          // вычисляем направление головы как вектор от следующего сегмента к голове
          let angle = 0;
          if (arr.length > 1) {
            const nx = arr[1].x; const ny = arr[1].y;
            const dx = head.x - nx; const dy = head.y - ny;
            angle = Math.atan2(dy, dx);
          } else {
            if (direction === 'right') angle = 0;
            else if (direction === 'left') angle = Math.PI;
            else if (direction === 'up') angle = -Math.PI/2;
            else if (direction === 'down') angle = Math.PI/2;
          }
          // радиусы: малый (узкая сторона) по центру движения, большой — поперёк
          const rMinor = Math.max(2, box * 0.28);
          const rMajor = Math.max(3, box * 0.45);
          if (snakeImgLoaded) {
            try {
              const src = (snakeImgSource || snakeImg);
              // Клип-эллипс и отрисовка изображения внутрь, чтобы голова была явно овальной
              ctx.save();
              ctx.translate(cx, cy);
              ctx.rotate(angle);
              ctx.beginPath();
              ctx.ellipse(0, 0, rMinor, rMajor, 0, 0, Math.PI*2);
              ctx.clip();
              // Рисуем текстуру, центрируя её в ячейке головы
              const drawSize = box - 2;
              ctx.drawImage(src, 0, 0, src.width, src.height, -drawSize/2, -drawSize/2, drawSize, drawSize);
              // Обводка эллипса
              ctx.beginPath();
              ctx.ellipse(0, 0, rMinor, rMajor, 0, 0, Math.PI*2);
              ctx.lineWidth = Math.max(1, Math.floor(box*0.04));
              ctx.strokeStyle = 'rgba(0,0,0,0.18)';
              ctx.stroke();
              ctx.restore();
            } catch (e) {
              ctx.restore && ctx.restore();
              ctx.beginPath(); ctx.ellipse(cx, cy, rMinor, rMajor, angle, 0, Math.PI*2);
              ctx.fillStyle = headColor; ctx.fill();
              ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = Math.max(1, Math.floor(box*0.04)); ctx.stroke();
            }
          } else {
            ctx.beginPath(); ctx.ellipse(cx, cy, rMinor, rMajor, angle, 0, Math.PI*2);
            ctx.fillStyle = headColor; ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = Math.max(1, Math.floor(box*0.04)); ctx.stroke();
          }
        }
      }

    function update() {
      if (!snake.length) return;
      let head = {...snake[0]};
      if (direction === 'left') head.x -= 1;
      else if (direction === 'right') head.x += 1;
      else if (direction === 'up') head.y -= 1;
      else if (direction === 'down') head.y += 1;

      if (head.x < 0 || head.x >= Math.floor(canvasWidth/box) || head.y < 0 || head.y >= Math.floor(canvasHeight/box)) return gameOver();
      for (let i=0;i<snake.length;i++) if (snake[i].x===head.x && snake[i].y===head.y) return gameOver();

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) { score++; placeFood(); } else snake.pop();
      draw();
    }

    function placeFood() {
      let newFood;
      do {
        newFood = { x: Math.floor(Math.random() * Math.floor(canvasWidth/box)), y: Math.floor(Math.random() * Math.floor(canvasHeight/box)) };
      } while (snake.some(s => s.x===newFood.x && s.y===newFood.y));
      food = newFood;
    }

    function placeDemoFood() {
      let newFood;
      do {
        newFood = { x: Math.floor(Math.random() * Math.floor(canvasWidth/box)), y: Math.floor(Math.random() * Math.floor(canvasHeight/box)) };
      } while (demoSnake.some(s => s.x===newFood.x && s.y===newFood.y));
      demoFood = newFood;
    }

    function drawFood(x, y, fallbackColor = '#f00') {
      const px = x * box; const py = y * box;
      const cx = px + box / 2; const cy = py + box / 2;
      const radius = Math.max(2, Math.floor(box/2) - 1);
      if (appleLoaded) {
        ctx.save();
        // Клипуем область в круг и рисуем изображение внутри
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        const src = appleImg;
        ctx.drawImage(src, 0, 0, src.width, src.height, px, py, box, box);
        ctx.restore();
        // Тонкая обводка круга
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = Math.max(1, Math.floor(box * 0.06));
        ctx.stroke();
      } else {
        // fallback: рисуем круглый яблоко без квадратов
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2);
        ctx.fillStyle = fallbackColor; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, Math.floor(box * 0.06)); ctx.stroke();
      }
    }

    function startDemo() {
      stopDemo();
      const cellsX = Math.floor(canvasWidth/box);
      const cellsY = Math.floor(canvasHeight/box);
      const cx = Math.floor(cellsX/2);
      const cy = Math.floor(cellsY/2);
      demoSnake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
      demoDirection = 'right';
      placeDemoFood();
      demoLoop = setInterval(demoUpdate, 200);
      // убедиться, что фон сгенерирован
      generateGrassBackground();
    }

    function generateGrassBackground() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      bgCanvas.width = canvasWidth * dpr;
      bgCanvas.height = canvasHeight * dpr;
      bgCanvas.style.width = canvasWidth + 'px';
      bgCanvas.style.height = canvasHeight + 'px';
      bgCtx.setTransform(dpr,0,0,dpr,0,0);
      // Попробуем загрузить файл-плитку пользователя из Downloads
      const tilePrimary = '../../../Downloads/трава.avif';
      const tileAlt = '../../../Downloads/трава фон.jfif';
      const tilePrimaryURL = encodeURI(tilePrimary);
      const tileAltURL = encodeURI(tileAlt);
      const img = new Image();
      let usedImage = false;
      let triedAlt = false;
      img.onload = function(){
        try {
          // Создаём большую плитку 2x2, где некоторые сегменты зеркально отражены
          const tileW = img.width;
          const tileH = img.height;
          const pc = document.createElement('canvas');
          pc.width = tileW * 2;
          pc.height = tileH * 2;
          const pcCtx = pc.getContext('2d');
          // верхний левый — оригинал
          pcCtx.drawImage(img, 0, 0, tileW, tileH);
          // верхний правый — зеркально по X
          pcCtx.save(); pcCtx.translate(tileW * 2, 0); pcCtx.scale(-1, 1);
          pcCtx.drawImage(img, 0, 0, tileW, tileH);
          pcCtx.restore();
          // нижний левый — зеркально по Y
          pcCtx.save(); pcCtx.translate(0, tileH * 2); pcCtx.scale(1, -1);
          pcCtx.drawImage(img, 0, 0, tileW, tileH);
          pcCtx.restore();
          // нижний правый — зеркально по X и Y
          pcCtx.save(); pcCtx.translate(tileW * 2, tileH * 2); pcCtx.scale(-1, -1);
          pcCtx.drawImage(img, 0, 0, tileW, tileH);
          pcCtx.restore();

          const pattern = bgCtx.createPattern(pc, 'repeat');
          bgCtx.fillStyle = pattern;
          bgCtx.fillRect(0,0,canvasWidth,canvasHeight);
          usedImage = true;
        } catch (err) {
          console.warn('Pattern creation failed, fallback to procedural:', err);
          usedImage = false;
        }
        // добавить несколько акцентов поверх плитки
        const flowers = Math.max(3, Math.floor((canvasWidth*canvasHeight)/200000));
        for (let f=0; f<flowers; f++){
          const x = Math.random()*canvasWidth;
          const y = Math.random()*canvasHeight*0.8 + canvasHeight*0.1;
          bgCtx.beginPath(); bgCtx.moveTo(x,y); bgCtx.lineTo(x, y-8); bgCtx.strokeStyle='#2b7d2b'; bgCtx.lineWidth=1.5; bgCtx.stroke();
          bgCtx.fillStyle = '#ffd1dc';
          for (let p=0;p<5;p++){
            const a = (Math.PI*2/5)*p;
            const px = x + Math.cos(a)*4;
            const py = y - 8 + Math.sin(a)*4;
            bgCtx.beginPath(); bgCtx.ellipse(px,py,3,2,0,0,Math.PI*2); bgCtx.fill();
          }
          bgCtx.fillStyle = '#ffda00'; bgCtx.beginPath(); bgCtx.arc(x, y-8, 2, 0, Math.PI*2); bgCtx.fill();
        }
        // лёгкий шум точками
        bgCtx.fillStyle = 'rgba(255,255,255,0.02)';
        for (let i=0;i<Math.floor(canvasWidth*canvasHeight/8000);i++){ bgCtx.fillRect(Math.random()*canvasWidth, Math.random()*canvasHeight, 1,1); }
        updateDecorSVG();
      };
      img.onerror = function(){
        if (!triedAlt) { triedAlt = true; img.src = tileAltURL; return; }
        // Если загрузка не удалась — используем процедурную генерацию как раньше
        const g = bgCtx.createLinearGradient(0,0,0,canvasHeight);
        g.addColorStop(0, '#6bd26b');
        g.addColorStop(0.6, '#49b849');
        g.addColorStop(1, '#2e8b2e');
        bgCtx.fillStyle = g;
        bgCtx.fillRect(0,0,canvasWidth,canvasHeight);
        const blades = Math.floor((canvasWidth*canvasHeight)/1800);
        for (let i=0;i<blades;i++){
          const x = Math.random()*canvasWidth;
          const y = Math.random()*canvasHeight*0.85 + canvasHeight*0.05;
          const h = 6 + Math.random()*28;
          const count = 2 + Math.floor(Math.random()*5);
          for (let b=0;b<count;b++){
            const offset = (b-(count-1)/2) * (0.8 + Math.random()*1.6);
            bgCtx.beginPath();
            bgCtx.moveTo(x + offset, y);
            const ctrlX = x + offset*0.4 + (Math.random()-0.5)*6;
            const tipX = x + offset*1.2 + (Math.random()-0.5)*8;
            bgCtx.quadraticCurveTo(ctrlX, y - h*0.6, tipX, y - h);
            const shade = Math.random()>0.6 ? '#3fa13f' : '#2f8f2f';
            bgCtx.strokeStyle = shade;
            bgCtx.lineWidth = 1 + Math.random()*0.8;
            bgCtx.stroke();
          }
        }
        const flowers = Math.max(3, Math.floor((canvasWidth*canvasHeight)/200000));
        for (let f=0; f<flowers; f++){
          const x = Math.random()*canvasWidth;
          const y = Math.random()*canvasHeight*0.8 + canvasHeight*0.1;
          bgCtx.beginPath(); bgCtx.moveTo(x,y); bgCtx.lineTo(x, y-8); bgCtx.strokeStyle='#2b7d2b'; bgCtx.lineWidth=1.5; bgCtx.stroke();
          bgCtx.fillStyle = '#ffd1dc';
          for (let p=0;p<5;p++){
            const a = (Math.PI*2/5)*p;
            const px = x + Math.cos(a)*4;
            const py = y - 8 + Math.sin(a)*4;
            bgCtx.beginPath(); bgCtx.ellipse(px,py,3,2,0,0,Math.PI*2); bgCtx.fill();
          }
          bgCtx.fillStyle = '#ffda00'; bgCtx.beginPath(); bgCtx.arc(x, y-8, 2, 0, Math.PI*2); bgCtx.fill();
        }
        bgCtx.fillStyle = 'rgba(255,255,255,0.02)';
        for (let i=0;i<Math.floor(canvasWidth*canvasHeight/8000);i++){ bgCtx.fillRect(Math.random()*canvasWidth, Math.random()*canvasHeight, 1,1); }
        updateDecorSVG();
      };
      // Попытка загрузить плитку (путь относительно файла HTML). Сначала пробуем primary, затем alt.
      img.src = tilePrimaryURL;
    }

    function updateDecorSVG(){
      if (!decorSVG) return;
      // синхронизируем viewBox с текущим размером
      decorSVG.setAttribute('viewBox', `0 0 ${canvasWidth} ${canvasHeight}`);
      // очистка
      while (decorSVG.firstChild) decorSVG.removeChild(decorSVG.firstChild);
      // (Удалена генерация векторных деревьев/кустов — оставляем только логотип)
      // Вставляем пользовательский SVG-логотип в правый нижний угол
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(svgLogo, 'image/svg+xml');
        const svgEl = doc.documentElement;
        const originalW = 136; const originalH = 14.6;
        const desiredW = Math.min(canvasWidth * 0.28, originalW);
        const scaleFactor = desiredW / originalW;
        const desiredH = originalH * scaleFactor;
        const margin = 8;
        const posX = canvasWidth - desiredW - margin;
        const posY = canvasHeight - desiredH - margin;
        const g = document.createElementNS(decorSVG.namespaceURI, 'g');
        g.setAttribute('transform', `translate(${posX},${posY}) scale(${scaleFactor})`);
        // импортируем содержимое найденного SVG (вместо корневого <svg>)
        for (let i=0;i<svgEl.childNodes.length;i++){
          const node = svgEl.childNodes[i];
          if (node.nodeType === Node.ELEMENT_NODE) g.appendChild(document.importNode(node, true));
        }
        decorSVG.appendChild(g);
      } catch (err) { console.warn('Не удалось встраивать логотип SVG:', err); }
    }

    function stopDemo() {
      if (demoLoop) { clearInterval(demoLoop); demoLoop = null; }
    }

    function demoUpdate() {
      if (!demoSnake.length) return;
      // простая логика: двигаться в направлении еды по оси x или y
      let head = {...demoSnake[0]};
      const dx = demoFood.x - head.x;
      const dy = demoFood.y - head.y;
      if (Math.abs(dx) > Math.abs(dy)) demoDirection = dx > 0 ? 'right' : 'left';
      else if (dy !== 0) demoDirection = dy > 0 ? 'down' : 'up';

      if (demoDirection === 'left') head.x -= 1;
      else if (demoDirection === 'right') head.x += 1;
      else if (demoDirection === 'up') head.y -= 1;
      else if (demoDirection === 'down') head.y += 1;

      // wrap-around для демо
      const cellsX = Math.floor(canvasWidth/box);
      const cellsY = Math.floor(canvasHeight/box);
      if (head.x < 0) head.x = cellsX-1; if (head.x >= cellsX) head.x = 0;
      if (head.y < 0) head.y = cellsY-1; if (head.y >= cellsY) head.y = 0;

      // столкновение с собой — перезапуск демо
      if (demoSnake.some(s => s.x===head.x && s.y===head.y)) { startDemo(); return; }

      demoSnake.unshift(head);
      if (head.x === demoFood.x && head.y === demoFood.y) { placeDemoFood(); } else demoSnake.pop();
      // рисуем демо поверх канвы
      draw();
    }

    function gameOver() {
      clearInterval(gameLoop);
      ctx.fillStyle = '#fff'; ctx.font = '32px Arial'; ctx.textAlign = 'center';
      ctx.fillText(translations[lang].gameOver, canvasWidth/2, canvasHeight/2);
      restartBtn.textContent = translations[lang].restart; restartBtn.style.display = 'inline-block';
      if (menuBtn) { menuBtn.textContent = translations[lang].menu; menuBtn.style.display = 'inline-block'; }
      isGameOver = true;
      // Перемещаем HUD-кнопки ближе к надписи "Игра окончена"
      const hudButtons = document.getElementById('hudButtons');
      if (hudButtons) {
        hudButtons.style.left = (canvasWidth/2) + 'px';
        hudButtons.style.top = (canvasHeight/2 + 36) + 'px';
        hudButtons.style.bottom = '';
        hudButtons.style.transform = 'translate(-50%,0)';
      }
    }

    document.addEventListener('keydown', function(e){
      const tag = (e.target && e.target.tagName) || '';
      if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return; // не мешаем вводам
      const key = e.key;

      // Если игра окончена — перезапуск только по Space или Enter
      if (isGameOver) {
        if (key === ' ' || key === 'Spacebar' || key === 'Enter') {
          e.preventDefault();
          startGame();
        }
        return;
      }

      const navKeys = ['ArrowLeft','ArrowUp','ArrowRight','ArrowDown','a','w','d','s'];
      if (navKeys.includes(key)) {
        e.preventDefault();
        if ((key === 'ArrowLeft' || key === 'a') && direction !== 'right') direction = 'left';
        else if ((key === 'ArrowUp' || key === 'w') && direction !== 'down') direction = 'up';
        else if ((key === 'ArrowRight' || key === 'd') && direction !== 'left') direction = 'right';
        else if ((key === 'ArrowDown' || key === 's') && direction !== 'up') direction = 'down';
      }
    }, {passive:false});

    function updateTexts(){
      startBtn.textContent = translations[lang].start;
      settingsBtn.textContent = translations[lang].settings;
      document.getElementById('score').textContent = translations[lang].score + ': ' + score;
      backBtn.textContent = translations[lang].back;
      titleEl.textContent = translations[lang].title;
      if (menuBtn) menuBtn.textContent = translations[lang].menu;
      scaleValue.textContent = scale.toFixed(2);
      scaleRange.value = scale;
      langSelect.value = lang;
    }

    function updateCanvasSize(){
      // растянуть поле на весь размер рабочей области браузера с учётом scale
      const availW = Math.floor(window.innerWidth * scale);
      const availH = Math.floor(window.innerHeight * scale);
      // приводим размеры к кратным `box` чтобы сетка совпадала
      canvasWidth = Math.max(box*10, Math.floor(availW/box) * box);
      canvasHeight = Math.max(box*10, Math.floor(availH/box) * box);
      canvas.width = canvasWidth; canvas.height = canvasHeight;
      // обновляем размеры контейнера overlay
      const wrap = document.getElementById('gameWrap');
      if (wrap) { wrap.style.width = canvasWidth + 'px'; wrap.style.height = canvasHeight + 'px'; }
      // (re)генерируем фон под новый размер
      generateGrassBackground();
      draw();
    }

    // события для оверлей-меню
    const overlayContent = document.getElementById('overlayContent');

    startBtn.addEventListener('click', ()=>{ overlay.style.display='none'; overlaySettings.style.display='none'; restartBtn.style.display='none'; stopDemo(); startGame(); });
    settingsBtn.addEventListener('click', ()=>{ overlaySettings.style.display='block'; });
    backBtn.addEventListener('click', ()=>{ overlaySettings.style.display='none'; updateTexts(); });
    langSelect.addEventListener('change', function(){ lang=this.value; updateTexts(); });
    scaleRange.addEventListener('input', function(){ scale=parseFloat(this.value); scaleValue.textContent=scale.toFixed(2); updateCanvasSize(); });
    restartBtn.addEventListener('click', ()=>{ restartBtn.style.display='none'; startGame(); });
    if (menuBtn) menuBtn.addEventListener('click', ()=>{
      clearInterval(gameLoop);
      isGameOver = false;
      restartBtn.style.display='none';
      menuBtn.style.display='none';
      if (overlaySettings) overlaySettings.style.display='none';
      if (overlay) { overlay.style.display='flex'; }
      // вернуть кнопки HUD внизу
      const hudButtons = document.getElementById('hudButtons');
      if (hudButtons) { hudButtons.style.left = '50%'; hudButtons.style.bottom = '12px'; hudButtons.style.top = ''; hudButtons.style.transform = 'translateX(-50%)'; }
      startDemo();
    });
    window.addEventListener('resize', updateCanvasSize);

    function startGame(){
      clearInterval(gameLoop);
      stopDemo();
      if (overlay) overlay.style.display='none';
      isGameOver = false;
      restartBtn.style.display = 'none';
      if (menuBtn) menuBtn.style.display = 'none';
      score=0; direction='right';
      const cellsX = Math.floor(canvasWidth/box);
      const cellsY = Math.floor(canvasHeight/box);
      const cx = Math.floor(cellsX/2);
      const cy = Math.floor(cellsY/2);
      snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
      placeFood(); updateTexts(); updateCanvasSize();
      // убедиться, что фон сгенерирован для текущего размера
      generateGrassBackground();
      draw();
      gameLoop = setInterval(update,120);
      // вернуть кнопки HUD в нижнюю часть поля
      const hudButtons = document.getElementById('hudButtons');
      if (hudButtons) {
        hudButtons.style.left = '50%';
        hudButtons.style.bottom = '12px';
        hudButtons.style.top = '';
        hudButtons.style.transform = 'translateX(-50%)';
      }
    }

    function restartGame(){ startGame(); }

    // Инициализация UI и запуск демо
    updateTexts(); updateCanvasSize();
    const overlayEl = document.getElementById('overlay'); if (overlayEl) overlayEl.style.display = 'flex';
    startDemo();
    })();
  </script>
</body>
</html>
